<svg width="720" height="260" viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg">

<defs>

<filter id="glow">
<feGaussianBlur stdDeviation="6" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

</defs>

<rect width="720" height="260" rx="20" fill="#0f0f14"/>

<!-- Disc -->
<g transform="translate(140,130)">
<circle r="90" fill="url(#grad)"/>

<animateTransform
attributeName="transform"
type="rotate"
from="0"
to="360"
dur="6s"
repeatCount="indefinite"
/>

</g>

<defs>
<radialGradient id="grad">
<stop offset="0%" stop-color="#222"/>
<stop offset="100%" stop-color="#000"/>
</radialGradient>
</defs>

<!-- Disc hole -->
<circle cx="140" cy="130" r="18" fill="#000"/>

<!-- Track Info -->

<text x="260" y="110"
font-size="42"
fill="#ffffff"
font-family="Arial"
font-weight="bold"
filter="url(#glow)">
HOT
</text>

<text x="260" y="150"
font-size="22"
fill="#1DB954"
font-family="Arial">
LE SSERAFIM
</text>

<!-- Equalizer -->

<rect x="260" y="180" width="8" height="20" fill="#1DB954">
<animate attributeName="height" values="10;40;10" dur="1s" repeatCount="indefinite"/>
</rect>

<rect x="275" y="180" width="8" height="30" fill="#1DB954">
<animate attributeName="height" values="30;10;30" dur="1.2s" repeatCount="indefinite"/>
</rect>

<rect x="290" y="180" width="8" height="25" fill="#1DB954">
<animate attributeName="height" values="20;45;20" dur="0.9s" repeatCount="indefinite"/>
</rect>

<rect x="305" y="180" width="8" height="35" fill="#1DB954">
<animate attributeName="height" values="40;15;40" dur="1.1s" repeatCount="indefinite"/>
</rect>

<!-- Play Button -->

<circle cx="650" cy="200" r="35" fill="#1DB954" filter="url(#glow)">
<animate attributeName="r" values="35;38;35" dur="1.5s" repeatCount="indefinite"/>
</circle>

<polygon points="640,185 640,215 665,200" fill="#000"/>

</svg>
